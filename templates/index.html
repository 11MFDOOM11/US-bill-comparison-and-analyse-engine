<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>US Bill Analyzer</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-brand">
      <div class="header-seal">&#9733;</div>
      <div>
        <div class="header-title">US Bill Analyzer</div>
        <div class="header-subtitle">Congressional Legislation Analysis Engine</div>
      </div>
    </div>
    <div class="header-badge">Powered by Claude AI</div>
  </div>
</header>

<main>
  <div class="card">
    <div class="card-title">Analyze a Bill</div>
    <div class="form-grid">
      <div class="form-row form-row-2">
        <div class="field">
          <label for="bill-pkg">Package ID</label>
          <input type="text" id="bill-pkg" placeholder="e.g. BILLS-118hr1234ih" autofocus>
          <span class="hint">GovInfo package identifier</span>
        </div>
        <div class="field">
          <label for="bill-model">Model <span style="font-weight:400;color:var(--muted)">(optional)</span></label>
          <input type="text" id="bill-model" placeholder="claude-sonnet-4-6">
          <span class="hint">Leave blank to use the default model</span>
        </div>
      </div>
      <div>
        <button class="btn btn-primary" id="bill-btn" onclick="runBill()">
          <span class="spinner" id="bill-spinner"></span>
          <span id="bill-btn-text">Analyze Bill</span>
        </button>
      </div>
    </div>
  </div>

  <div class="card result-area" id="bill-result">
    <div class="result-header">
      <div class="card-title" style="margin:0;border:none;padding:0">Results</div>
      <span class="result-badge" id="bill-badge"></span>
    </div>
    <div id="bill-output"></div>
  </div>
</main>

<footer>
  US Bill Analyzer &nbsp;&bull;&nbsp; Powered by Anthropic Claude &amp; GovInfo API
</footer>

<script>
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function renderBill(r) {
  let html = '';

  // ── Metadata ────────────────────────────────────────────────────
  if (r.metadata_error) {
    html += `<div class="module-section">
      <div class="section-label">Metadata</div>
      <div class="error-box">${escHtml(r.metadata_error)}</div>
    </div>`;
  } else if (r.metadata) {
    const m = r.metadata;
    const rows = [
      ['Title',            m.title],
      ['Package ID',       m.package_id],
      ['Congress',         m.congress],
      ['Bill Type',        m.bill_type],
      ['Bill Number',      m.bill_number],
      ['Date Issued',      m.date_issued],
      ['Session',          m.session],
      ['Collection Code',  m.collection_code],
      ['Government Author',(m.government_author || []).join(', ')],
    ].filter(([, v]) => v)
      .map(([k, v]) => `<tr><th>${escHtml(k)}</th><td>${escHtml(v)}</td></tr>`)
      .join('');
    html += `<div class="module-section">
      <div class="section-label">Metadata</div>
      <table class="meta-table"><tbody>${rows}</tbody></table>
    </div>`;
  }

  // ── Summary ─────────────────────────────────────────────────────
  if (r.summary_error) {
    html += `<div class="module-section">
      <div class="section-label">Plain-English Summary</div>
      <div class="error-box">${escHtml(r.summary_error)}</div>
    </div>`;
  } else if (r.summary) {
    html += `<div class="module-section">
      <div class="section-label">Plain-English Summary</div>
      <div class="summary-text">${escHtml(r.summary)}</div>
    </div>`;
  }

  // ── Analysis ─────────────────────────────────────────────────────
  if (r.analysis_error) {
    html += `<div class="module-section">
      <div class="section-label">Full Analysis</div>
      <div class="error-box">${escHtml(r.analysis_error)}</div>
    </div>`;
  } else if (r.analysis) {
    const a = r.analysis;
    const provisions = (a.key_provisions || [])
      .map(p => `<li>${escHtml(p)}</li>`).join('');
    html += `<div class="module-section">
      <div class="section-label">Full Analysis</div>
      ${a.plain_english_summary ? `<div class="prose">${escHtml(a.plain_english_summary)}</div>` : ''}
      ${provisions ? `
      <div class="section-label" style="margin-top:1rem">Key Provisions</div>
      <ul class="provisions-list">${provisions}</ul>` : ''}
      ${a.potential_impact ? `
      <div class="section-label" style="margin-top:1rem">Potential Impact</div>
      <div class="prose">${escHtml(a.potential_impact)}</div>` : ''}
      ${a.sponsors_and_context ? `
      <div class="section-label" style="margin-top:1rem">Sponsors &amp; Context</div>
      <div class="prose">${escHtml(a.sponsors_and_context)}</div>` : ''}
    </div>`;
  }

  return html || '<div class="prose" style="color:var(--muted)">No data returned.</div>';
}

async function runBill() {
  const packageId = document.getElementById('bill-pkg').value.trim();
  if (!packageId) {
    document.getElementById('bill-pkg').focus();
    return;
  }

  const btn     = document.getElementById('bill-btn');
  const spinner = document.getElementById('bill-spinner');
  const result  = document.getElementById('bill-result');
  const badge   = document.getElementById('bill-badge');
  const output  = document.getElementById('bill-output');

  btn.disabled = true;
  spinner.style.display = 'block';

  try {
    const res = await fetch('/api/bill', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        package_id: packageId,
        model: document.getElementById('bill-model').value.trim() || null,
      }),
    });
    const data = await res.json();
    result.style.display = 'block';

    if (data.error) {
      badge.className = 'result-badge result-badge-err';
      badge.textContent = 'Error';
      output.innerHTML = `<div class="error-box">${escHtml(data.error)}</div>`;
    } else {
      badge.className = 'result-badge result-badge-ok';
      badge.textContent = 'Success';
      output.innerHTML = renderBill(data.result);
    }
  } catch (err) {
    result.style.display = 'block';
    badge.className = 'result-badge result-badge-err';
    badge.textContent = 'Error';
    output.innerHTML = `<div class="error-box">Network error: ${escHtml(err.message)}</div>`;
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') runBill();
});
</script>
</body>
</html>
